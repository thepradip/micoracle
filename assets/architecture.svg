<svg xmlns="http://www.w3.org/2000/svg" width="960" height="960" viewBox="0 0 960 960" role="img" aria-labelledby="title desc">
  <title id="title">micoracle architecture</title>
  <desc id="desc">A simple architecture diagram showing speech capture, prompt understanding, and dispatch to the coding assistant.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#151b23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#58a6ff"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .frame { fill: #0f1720; stroke: #30363d; stroke-width: 2; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 2; filter: url(#shadow); }
      .note { fill: #101820; stroke: #263442; stroke-width: 2; }
      .title { font: 800 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e6edf3; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9aa7b4; }
      .step { font: 800 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58a6ff; letter-spacing: 1px; }
      .label { font: 800 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e6edf3; }
      .body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9aa7b4; }
      .mono { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #a5d6ff; letter-spacing: .04em; }
      .wire { fill: none; stroke: #58a6ff; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .icon { fill: none; stroke: currentColor; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .blue { color: #58a6ff; }
      .green { color: #56d364; }
      .yellow { color: #d29922; }
    </style>
  </defs>

  <rect class="bg" width="960" height="960"/>
  <rect class="frame" x="28" y="28" width="904" height="484" rx="24"/>

  <g transform="translate(62 58)">
    <rect x="0" y="0" width="48" height="48" rx="14" fill="url(#accent)"/>
    <g transform="translate(15 9)" color="#fff">
      <path class="icon" d="M9 0c-5 0-9 4-9 9v12c0 5 4 9 9 9s9-4 9-9V9c0-5-4-9-9-9Z"/>
      <path class="icon" d="M-5 20c0 9 6 16 14 16s14-7 14-16M9 36v8M2 44h14"/>
    </g>
    <text class="title" x="66" y="22">micoracle architecture</text>
    <text class="subtitle" x="68" y="46">A wake-word voice pipeline for sending prompts to coding assistants.</text>
  </g>

  <g transform="translate(62 158)">
    <rect class="card" x="0" y="0" width="240" height="190" rx="18"/>
    <text class="step" x="26" y="34">01 CAPTURE</text>
    <circle cx="44" cy="72" r="22" fill="#0d2340" stroke="#1f6feb" stroke-width="2"/>
    <g class="blue" transform="translate(35 57)">
      <path class="icon" d="M9 0c-5 0-9 4-9 9v12c0 5 4 9 9 9s9-4 9-9V9c0-5-4-9-9-9Z"/>
      <path class="icon" d="M-5 20c0 9 6 16 14 16s14-7 14-16"/>
    </g>
    <text class="label" x="26" y="116">Listen</text>
    <text class="body" x="26" y="146">Microphone audio is</text>
    <text class="body" x="26" y="168">captured in 30 ms</text>
  </g>

  <g transform="translate(360 158)">
    <rect class="card" x="0" y="0" width="240" height="190" rx="18"/>
    <text class="step" x="26" y="34">02 UNDERSTAND</text>
    <circle cx="44" cy="72" r="22" fill="#10281a" stroke="#238636" stroke-width="2"/>
    <g class="green" transform="translate(29 59)">
      <path class="icon" d="M0 22c9-16 21-24 35-24s26 8 35 24"/>
      <path class="icon" d="M14 18c6-8 13-12 21-12s15 4 21 12"/>
      <circle cx="35" cy="34" r="5" fill="currentColor"/>
    </g>
    <text class="label" x="26" y="116">Transcribe</text>
    <text class="body" x="26" y="146">VAD finds speech, then</text>
    <text class="body" x="26" y="168">STT turns it into text.</text>
  </g>

  <g transform="translate(658 158)">
    <rect class="card" x="0" y="0" width="240" height="190" rx="18"/>
    <text class="step" x="26" y="34">03 ACT</text>
    <circle cx="44" cy="72" r="22" fill="#2d2008" stroke="#8a641c" stroke-width="2"/>
    <g class="yellow" transform="translate(31 56)">
      <path class="icon" d="M0 16l11 11 27-27"/>
      <path class="icon" d="M2 42h38"/>
    </g>
    <text class="label" x="26" y="116">Send prompt</text>
    <text class="body" x="26" y="146">Wake-word checks pass,</text>
    <text class="body" x="26" y="168">then prompt is pasted.</text>
  </g>

  <path class="wire" d="M302 252H350"/>
  <path class="wire" d="M600 252H648"/>

  <g transform="translate(62 392)">
    <rect class="note" x="0" y="0" width="836" height="72" rx="16"/>
    <text class="mono" x="28" y="30">SAFETY GATE</text>
    <text class="body" x="28" y="54">Non-wake-word speech is ignored. Optional TTS only speaks short status cues like listening, sent, or error.</text>
  </g>
</svg>
